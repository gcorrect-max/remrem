version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: remview_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-remview}
      POSTGRES_USER:     ${POSTGRES_USER:-remview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-remview123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - remview_pgdata:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./server/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remview} -d ${POSTGRES_DB:-remview}"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: remview_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@remview.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - remview_pgadmin:/var/lib/pgadmin

volumes:
  remview_pgdata:
  remview_pgadmin:
